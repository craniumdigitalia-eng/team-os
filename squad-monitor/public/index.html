<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squad Monitor</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="app">

  <!-- Header (64px) ─────────────────────────────────────────────── -->
  <header id="header">
    <div class="header-brand">
      <span class="brand-triangle"></span>
      <span class="brand-wordmark">Squad <em>Monitor</em></span>
      <span class="brand-eyebrow">claude · teams</span>
    </div>

    <div class="header-right">
      <!-- Live toggle -->
      <button class="live-toggle" id="live-toggle" aria-label="Toggle live feed">
        <span class="live-dot" id="live-dot"></span>
        <span class="live-label" id="live-label">CONECTANDO</span>
      </button>

      <!-- Metrics group -->
      <div class="metrics-group">
        <div class="metric-item">
          <span class="metric-label">Ativos</span>
          <span class="metric-value metric-ember" id="stat-active">0</span>
        </div>
        <div class="metric-item">
          <span class="metric-label">Done</span>
          <span class="metric-value" id="stat-done">0</span>
        </div>
        <div class="metric-item">
          <span class="metric-label">Calls</span>
          <span class="metric-value" id="stat-calls">0</span>
        </div>
        <div class="metric-item">
          <span class="metric-label">Tokens</span>
          <span class="metric-value" id="stat-tokens">—</span>
        </div>
        <div class="metric-item">
          <span class="metric-label">Sessão</span>
          <span class="metric-value" id="stat-dur">—:—</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Body ──────────────────────────────────────────────────────── -->
  <div id="body">

    <!-- Aside: Sessions ──────────────────────────────────────────── -->
    <aside id="sessions-aside">
      <div class="sessions-sticky-header">
        <span class="panel-mono-label">Sessões</span>
      </div>
      <div id="sessions-list">
        <div class="sessions-empty">Aguardando sessões...</div>
      </div>
      <div class="sessions-footer">
        <span class="sessions-footer-label">FONTE</span>
        <span class="sessions-footer-text">SSE /events</span>
      </div>
    </aside>

    <!-- Section: Main ────────────────────────────────────────────── -->
    <section id="main-section">

      <!-- Agents area (1fr) ─────────────────────────────────────── -->
      <div id="agents-area">
        <div class="agents-topbar">
          <span class="topbar-label ember">AGENTES</span>
          <span class="topbar-session-tag" id="agents-session-tag"></span>
          <span class="topbar-count" id="agents-count-label"></span>
        </div>
        <div id="agents-grid">
          <div class="placeholder-center">
            <span class="placeholder-title">Nenhuma sessão selecionada</span>
            <span class="placeholder-sub">Selecione uma sessão na sidebar</span>
          </div>
        </div>
      </div>

      <!-- Timeline area (236px) ─────────────────────────────────── -->
      <div id="timeline-area">
        <div class="timeline-topbar">
          <span class="topbar-label ember">TIMELINE</span>
          <span class="timeline-agent-label" id="timeline-agent-label">—</span>
          <span class="timeline-kind-label" id="timeline-list-header">PreToolUse / PostToolUse</span>
        </div>
        <div id="timeline-list">
          <div class="timeline-empty">Selecione um agente para ver a timeline</div>
        </div>
      </div>

    </section>
  </div><!-- /#body -->

</div><!-- /#app -->

<!-- Backdrop ──────────────────────────────────────────────────── -->
<div id="drawer-backdrop"></div>

<!-- Drawer ────────────────────────────────────────────────────── -->
<aside id="agent-detail-drawer">
  <div class="drawer-header">
    <div class="drawer-header-left">
      <span class="drawer-agent-title" id="drawer-agent-title">Agente</span>
      <span class="drawer-agent-meta" id="drawer-agent-meta"></span>
    </div>
    <button class="drawer-close-btn" id="drawer-close-btn" aria-label="Fechar">ESC ✕</button>
  </div>
  <div class="drawer-body" id="drawer-body">
    <div class="drawer-loading">Carregando detalhes...</div>
  </div>
</aside>

<script type="module" src="/app.js"></script>
</body>
</html>
